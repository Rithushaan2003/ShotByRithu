<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact | ShotByRithu</title>
  <link rel="stylesheet" href="style.css">

  <!-- EMAILJS -->
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
  <script>
    (function() {
      emailjs.init("rDfE1E9AolJZZfimb");
    })();
  </script>
</head>

<body>

<header>
  <div class="container nav">
    <div class="logo">
      <div class="logo-mark">SBR</div>
      <div class="logo-text">SHOT BY RITHU</div>
    </div>

    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="portfolio/index.html">Portfolio</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
  </div>
</header>

<section class="contact">

  <div class="container contact-inner fade-in">

    <h2 class="section-title">Get in Touch</h2>

    <p class="section-subtitle" id="contactSubtitle" style="margin-bottom: 25px;">
      Tell me about your event or shoot — I’ll get back to you shortly.
    </p>

    <!-- ROW: IMAGE LEFT, FORM/SUCCESS RIGHT -->
    <div class="contact-row" style="display: flex; gap: 40px; align-items: flex-start; flex-wrap: wrap;">

      <!-- LEFT SIDE IMAGE -->
      <div class="contact-image" style="flex: 1 1 0;">
        <img src="Images/IMG_2544.PNG" alt="ShotByRithu">
      </div>

      <!-- RIGHT SIDE COLUMN (form + success message) -->
      <div class="contact-right" style="flex: 1 1 0; display: flex; flex-direction: column; gap: 20px;">

        <!-- FORM -->
        <form id="contactForm">

          <label>Your Name *</label>
          <input type="text" name="name" required placeholder="Enter your full name">

          <label>Email Address *</label>
          <input type="email" name="email" required placeholder="example@email.com">

          <label>Type of Event *</label>
          <select name="event_type" required>
            <option value="">Choose an option</option>
            <option>Birthday</option>
            <option>Ceremony</option>
            <option>Photoshoot</option>
            <option>Casual Event</option>
            <option>Casual Celebration</option>
            <option>Other (please specify in Additional Details)</option>
          </select>

          <label>Event Date(s)</label>
          <input type="text" name="event_date" placeholder="e.g. 12 July or 12–14 July">

          <label>Event Time</label>
          <input type="text" name="event_time" placeholder="e.g. 5pm – 10pm">

          <label>Location / Venue *</label>
          <input type="text" name="location" required placeholder="Where is the event taking place?">

          <label>Estimated Number of Guests *</label>
          <select name="guests" required>
            <option value="">Choose an option</option>
            <option>Less than 50</option>
            <option>50 to 100</option>
            <option>100 to 150</option>
            <option>150+</option>
          </select>

          <label>Additional Details</label>
          <textarea name="message" placeholder="Anything else you'd like me to know?"></textarea>

          <button class="btn-primary btn-full" style="margin-top: 20px;">SEND ENQUIRY</button>

        </form>

        <!-- SUCCESS MESSAGE (right side) -->
        <div id="successMessage" class="fade-in" style="
          display: none;
          padding: 20px;
          background: #0f0f0f;
          border: 1px solid #333;
          border-radius: 10px;
          color: #fff;
          text-align: center;
          font-size: 18px;
          font-weight: 600;
          opacity: 0;
        ">
          Thanks for your enquiry!<br>
          I’ll get back to you soon.
        </div>

      </div>

    </div>

  </div>

</section>

<footer>
  <div class="container footer-inner">
    <div>© 2026 ShotByRithu</div>

    <div class="footer-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="portfolio/index.html">Portfolio</a>
      <a href="contact.html">Contact</a>
    </div>

    <div style="margin-top: 10px;">
      <a href="https://instagram.com/shotbyrithu" target="_blank" style="color: #fff; opacity: 0.8;">
        Instagram: @shotbyrithu
      </a>
    </div>
  </div>
</footer>

<!-- EMAILJS FORM HANDLER -->
<script>
  const form = document.getElementById("contactForm");
  const successBox = document.getElementById("successMessage");
  const subtitle = document.getElementById("contactSubtitle");

  form.addEventListener("submit", function(e) {
    e.preventDefault();

    // Immediately update UI
    form.style.display = "none";
    if (subtitle) subtitle.style.display = "none";

    successBox.style.display = "block";
    setTimeout(() => {
      successBox.style.opacity = "1";
    }, 50);

    // Send email in background
    emailjs.sendForm("service_swis078", "template_ermgndd", form)
      .catch((error) => {
        console.error("EmailJS Error:", error);
      });
  });
</script>

</body>
</html>
